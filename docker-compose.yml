services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql        # 資料持久化：容器移除/重建後資料仍在
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Your_strong_Pass123\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # 管理介面 http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  matchservice:
    build:
      context: .
      dockerfile: Dockerfile.matchservice
    environment:
      ConnectionStrings__MatchDb: "Server=sqlserver,1433;Database=MatchDb;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True;Encrypt=False"
      Database__ScriptsPath: "db"
      Cors__Origins: "http://localhost:8088,http://localhost:5173"
    ports:
      - "5080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    environment:
      Ingestion__MatchServiceBaseUrl: "http://matchservice:8080"
      Ingestion__WorldCupTournamentId: "29614"
      Ingestion__IntervalSeconds: "300"
    depends_on:
      - matchservice

  liveingestion:
    build:
      context: .
      dockerfile: Dockerfile.liveingestion
    environment:
      Live__MatchServiceBaseUrl: "http://matchservice:8080"
      Live__WorldCupTournamentId: "29614"
      Live__IntervalSeconds: "12"
      Live__RabbitHost: "rabbitmq"
    depends_on:
      matchservice:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  outboxpublisher:
    build:
      context: .
      dockerfile: Dockerfile.outboxpublisher
    environment:
      ConnectionStrings__MatchDb: "Server=sqlserver,1433;Database=MatchDb;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True;Encrypt=False"
      RabbitMq__Host: "rabbitmq"
      Outbox__IntervalSeconds: "5"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notificationservice:
    build:
      context: .
      dockerfile: Dockerfile.notificationservice
    environment:
      RabbitMq__Host: "rabbitmq"
    depends_on:
      rabbitmq:
        condition: service_healthy

  realtimeservice:
    build:
      context: .
      dockerfile: Dockerfile.realtimeservice
    environment:
      RabbitMq__Host: "rabbitmq"
      Cors__Origins: "http://localhost:8088,http://localhost:5173"
    ports:
      - "5090:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8088:80"
    depends_on:
      - matchservice
      - realtimeservice

volumes:
  mssql-data:
